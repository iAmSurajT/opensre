<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSRE Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e1e8ed;
            min-height: 100vh;
        }

        .header {
            background: #1a2332;
            border-bottom: 1px solid #2d3d50;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }

        .header .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6b7280;
        }

        .status-dot.healthy { background: #10b981; }
        .status-dot.unhealthy { background: #ef4444; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .card {
            background: #1a2332;
            border: 1px solid #2d3d50;
            border-radius: 8px;
            padding: 20px;
        }

        .card h2 {
            font-size: 14px;
            font-weight: 500;
            color: #9ca3af;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card .value {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }

        .card .value.green { color: #10b981; }
        .card .value.red { color: #ef4444; }
        .card .value.yellow { color: #f59e0b; }

        .investigate-section {
            background: #1a2332;
            border: 1px solid #2d3d50;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .investigate-section h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #fff;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            background: #0f1419;
            border: 1px solid #2d3d50;
            border-radius: 6px;
            padding: 10px 12px;
            color: #e1e8ed;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        .btn {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover { background: #1d4ed8; }
        .btn:disabled { background: #374151; cursor: not-allowed; }
        .btn.secondary { background: #374151; }
        .btn.secondary:hover { background: #4b5563; }

        .results-section {
            background: #1a2332;
            border: 1px solid #2d3d50;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .results-section h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-card {
            background: #0f1419;
            border: 1px solid #2d3d50;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .result-card h3 {
            font-size: 14px;
            font-weight: 600;
            color: #60a5fa;
            margin-bottom: 8px;
        }

        .result-card pre {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            color: #d1d5db;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
        }

        .result-card .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge.completed { background: #064e3b; color: #10b981; }
        .badge.failed { background: #7f1d1d; color: #ef4444; }
        .badge.running { background: #78350f; color: #f59e0b; }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #374151;
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #0f1419;
            border: 1px solid #2d3d50;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .history-item:hover { border-color: #60a5fa; }

        .history-item .meta {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .history-item .name {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
        }

        .history-item .time {
            font-size: 12px;
            color: #6b7280;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
        }

        .tab {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            background: transparent;
            color: #9ca3af;
            border: none;
            transition: all 0.2s;
        }

        .tab.active {
            background: #2d3d50;
            color: #fff;
        }

        .tab:hover { color: #fff; }

        .log-output {
            background: #000;
            border: 1px solid #2d3d50;
            border-radius: 6px;
            padding: 16px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
            color: #10b981;
        }

        .log-output .log-line { margin-bottom: 2px; }
        .log-output .log-error { color: #ef4444; }
        .log-output .log-warn { color: #f59e0b; }
        .log-output .log-info { color: #60a5fa; }
    </style>
</head>
<body>
    <div class="header">
        <h1>OpenSRE Dashboard</h1>
        <div class="status">
            <span id="status-text">Checking...</span>
            <span class="status-dot" id="status-dot"></span>
        </div>
    </div>

    <div class="container">
        <div class="grid">
            <div class="card">
                <h2>Server Status</h2>
                <div class="value" id="server-status">--</div>
            </div>
            <div class="card">
                <h2>Version</h2>
                <div class="value" id="server-version">--</div>
            </div>
            <div class="card">
                <h2>LLM Provider</h2>
                <div class="value" id="llm-status">--</div>
            </div>
            <div class="card">
                <h2>Investigations Run</h2>
                <div class="value" id="investigation-count">0</div>
            </div>
        </div>

        <div class="investigate-section">
            <h2>New Investigation</h2>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('form')">Form</button>
                <button class="tab" onclick="switchTab('json')">Raw JSON</button>
            </div>

            <div id="tab-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Service Name</label>
                        <input type="text" id="input-service" placeholder="bid-ask-decorator" />
                    </div>
                    <div class="form-group">
                        <label>Environment</label>
                        <select id="input-env">
                            <option value="production">Production</option>
                            <option value="staging">Staging</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Severity</label>
                        <select id="input-severity">
                            <option value="error">Error</option>
                            <option value="warning">Warning</option>
                            <option value="critical">Critical</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Alert Name</label>
                    <input type="text" id="input-alert-name" placeholder="Warn: Bid Ask Decorator Errors" />
                </div>
                <div class="form-group">
                    <label>Error Message (from logs)</label>
                    <textarea id="input-error-msg" placeholder="The group is rebalancing, so a rejoin is needed"></textarea>
                </div>
                <div class="form-group">
                    <label>Monitor ID (optional)</label>
                    <input type="text" id="input-monitor-id" placeholder="18675899" />
                </div>
            </div>

            <div id="tab-json" style="display:none;">
                <div class="form-group">
                    <label>Alert Payload (JSON)</label>
                    <textarea id="input-raw-json" style="min-height:200px;" placeholder='{"source": "datadog", "monitor": {"name": "..."}, "alert": {...}}'></textarea>
                </div>
            </div>

            <button class="btn" id="btn-investigate" onclick="runInvestigation()">Run Investigation</button>
        </div>

        <div class="results-section">
            <h2>
                <span>Investigation Results</span>
                <span class="spinner" id="loading-spinner" style="display:none;"></span>
            </h2>

            <div id="results-container">
                <div class="empty-state">No investigations yet. Submit an alert above to get started.</div>
            </div>
        </div>

        <div class="results-section">
            <h2>Investigation History</h2>
            <div id="history-container">
                <div class="empty-state">Completed investigations will appear here.</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let investigationCount = 0;
        let history = [];

        async function checkHealth() {
            try {
                const resp = await fetch(`${API_BASE}/health`);
                const data = await resp.json();

                document.getElementById('status-dot').className = `status-dot ${data.ok ? 'healthy' : 'unhealthy'}`;
                document.getElementById('status-text').textContent = data.ok ? 'Healthy' : 'Degraded';
                document.getElementById('server-status').textContent = data.ok ? 'Online' : 'Degraded';
                document.getElementById('server-status').className = `value ${data.ok ? 'green' : 'red'}`;
                document.getElementById('server-version').textContent = data.version;
                document.getElementById('llm-status').textContent = data.llm_configured ? 'Configured' : 'Not Set';
                document.getElementById('llm-status').className = `value ${data.llm_configured ? 'green' : 'red'}`;
            } catch (e) {
                document.getElementById('status-dot').className = 'status-dot unhealthy';
                document.getElementById('status-text').textContent = 'Offline';
                document.getElementById('server-status').textContent = 'Offline';
                document.getElementById('server-status').className = 'value red';
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (tab === 'form') {
                document.getElementById('tab-form').style.display = 'block';
                document.getElementById('tab-json').style.display = 'none';
                document.querySelectorAll('.tab')[0].classList.add('active');
            } else {
                document.getElementById('tab-form').style.display = 'none';
                document.getElementById('tab-json').style.display = 'block';
                document.querySelectorAll('.tab')[1].classList.add('active');
            }
        }

        function buildPayloadFromForm() {
            const service = document.getElementById('input-service').value;
            const env = document.getElementById('input-env').value;
            const severity = document.getElementById('input-severity').value;
            const alertName = document.getElementById('input-alert-name').value;
            const errorMsg = document.getElementById('input-error-msg').value;
            const monitorId = document.getElementById('input-monitor-id').value;

            return {
                input: {
                    source: 'datadog',
                    type: 'log_alert',
                    monitor: {
                        id: monitorId ? parseInt(monitorId) : 0,
                        name: alertName || 'Manual Investigation'
                    },
                    alert: {
                        query: `service:${service}* status:${severity} env:${env}`,
                        environment: env,
                        service: service,
                        status: severity
                    },
                    samples: errorMsg ? [{
                        timestamp: new Date().toISOString(),
                        host: 'manual',
                        message: errorMsg
                    }] : []
                },
                mode: 'investigation'
            };
        }

        async function runInvestigation() {
            const btn = document.getElementById('btn-investigate');
            const spinner = document.getElementById('loading-spinner');

            btn.disabled = true;
            btn.textContent = 'Investigating...';
            spinner.style.display = 'inline-block';

            let payload;
            const jsonTab = document.getElementById('tab-json');
            if (jsonTab.style.display !== 'none') {
                try {
                    const raw = document.getElementById('input-raw-json').value;
                    const parsed = JSON.parse(raw);
                    payload = { input: parsed, mode: 'investigation' };
                } catch (e) {
                    alert('Invalid JSON payload');
                    btn.disabled = false;
                    btn.textContent = 'Run Investigation';
                    spinner.style.display = 'none';
                    return;
                }
            } else {
                payload = buildPayloadFromForm();
            }

            try {
                const resp = await fetch(`${API_BASE}/investigate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await resp.json();
                investigationCount++;
                document.getElementById('investigation-count').textContent = investigationCount;

                displayResult(data, payload);
                addToHistory(data, payload);

            } catch (e) {
                displayError(e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Run Investigation';
                spinner.style.display = 'none';
            }
        }

        function displayResult(data, payload) {
            const container = document.getElementById('results-container');
            const result = data.result || {};

            let html = `
                <div class="result-card">
                    <h3>Status</h3>
                    <span class="badge ${data.status}">${data.status}</span>
                    <span style="margin-left:8px;color:#6b7280;font-size:12px;">
                        Thread: ${data.thread_id} | Run: ${data.run_id}
                    </span>
                </div>
            `;

            if (result.root_cause) {
                html += `
                    <div class="result-card">
                        <h3>Root Cause</h3>
                        <pre>${escapeHtml(result.root_cause)}</pre>
                    </div>
                `;
            }

            if (result.root_cause_category) {
                html += `
                    <div class="result-card">
                        <h3>Category</h3>
                        <pre>${escapeHtml(result.root_cause_category)}</pre>
                    </div>
                `;
            }

            if (result.remediation_steps && result.remediation_steps.length > 0) {
                html += `
                    <div class="result-card">
                        <h3>Remediation Steps</h3>
                        <pre>${escapeHtml(result.remediation_steps.map((s, i) => `${i + 1}. ${typeof s === 'string' ? s : JSON.stringify(s)}`).join('\n'))}</pre>
                    </div>
                `;
            }

            if (result.report) {
                html += `
                    <div class="result-card">
                        <h3>Full Report</h3>
                        <pre>${escapeHtml(result.report)}</pre>
                    </div>
                `;
            }

            if (result.evidence && Object.keys(result.evidence).length > 0) {
                html += `
                    <div class="result-card">
                        <h3>Evidence</h3>
                        <pre>${escapeHtml(JSON.stringify(result.evidence, null, 2))}</pre>
                    </div>
                `;
            }

            if (!result.root_cause && !result.report) {
                html += `
                    <div class="result-card">
                        <h3>Raw Response</h3>
                        <pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        function displayError(message) {
            const container = document.getElementById('results-container');
            container.innerHTML = `
                <div class="result-card">
                    <h3 style="color:#ef4444;">Error</h3>
                    <pre class="log-error">${escapeHtml(message)}</pre>
                </div>
            `;
        }

        function addToHistory(data, payload) {
            const alertName = payload.input?.monitor?.name || payload.input?.alert?.service || 'Investigation';
            history.unshift({
                name: alertName,
                status: data.status,
                time: new Date().toLocaleTimeString(),
                thread_id: data.thread_id,
                data: data
            });

            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            if (history.length === 0) {
                container.innerHTML = '<div class="empty-state">Completed investigations will appear here.</div>';
                return;
            }

            container.innerHTML = history.map((item, i) => `
                <div class="history-item" onclick="showHistoryItem(${i})">
                    <div class="meta">
                        <span class="badge ${item.status}">${item.status}</span>
                        <span class="name">${escapeHtml(item.name)}</span>
                    </div>
                    <span class="time">${item.time}</span>
                </div>
            `).join('');
        }

        function showHistoryItem(index) {
            const item = history[index];
            displayResult(item.data, { input: { monitor: { name: item.name } } });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        checkHealth();
        setInterval(checkHealth, 15000);
    </script>
</body>
</html>
